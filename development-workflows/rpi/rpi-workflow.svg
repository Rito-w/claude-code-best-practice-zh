<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="35" font-size="18" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#333">RPI Workflow</text>

  <!-- Steps -->
  <circle cx="80" cy="120" r="40" fill="#1976d2"/>
  <text x="80" y="125" font-size="24" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#fff">R</text>
  <text x="80" y="180" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#333">Research</text>
  <text x="80" y="200" font-size="10" text-anchor="middle" font-family="Arial" fill="#666">Gather context</text>

  <line x1="120" y1="120" x2="280" y2="120" stroke="#1976d2" stroke-width="3" marker-end="url(#arrow)"/>

  <circle cx="320" cy="120" r="40" fill="#388e3c"/>
  <text x="320" y="125" font-size="24" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#fff">P</text>
  <text x="320" y="180" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#333">Plan</text>
  <text x="320" y="200" font-size="10" text-anchor="middle" font-family="Arial" fill="#666">Create strategy</text>

  <line x1="360" y1="120" x2="520" y2="120" stroke="#388e3c" stroke-width="3" marker-end="url(#arrow)"/>

  <circle cx="560" cy="120" r="40" fill="#f57c00"/>
  <text x="560" y="125" font-size="24" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#fff">I</text>
  <text x="560" y="180" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#333">Implement</text>
  <text x="560" y="200" font-size="10" text-anchor="middle" font-family="Arial" fill="#666">Execute plan</text>

  <!-- Agent Flow -->
  <rect x="650" y="50" width="130" height="280" rx="8" fill="#fff" stroke="#9c27b0" stroke-width="2"/>
  <text x="715" y="80" font-size="12" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#9c27b0">Agent Team</text>

  <rect x="665" y="95" width="100" height="35" rx="4" fill="#f3e5f5"/>
  <text x="715" y="117" font-size="9" text-anchor="middle" font-family="Arial" fill="#333">Product Manager</text>

  <rect x="665" y="140" width="100" height="35" rx="4" fill="#f3e5f5"/>
  <text x="715" y="162" font-size="9" text-anchor="middle" font-family="Arial" fill="#333">Technical Advisor</text>

  <rect x="665" y="185" width="100" height="35" rx="4" fill="#f3e5f5"/>
  <text x="715" y="207" font-size="9" text-anchor="middle" font-family="Arial" fill="#333">Engineer</text>

  <rect x="665" y="230" width="100" height="35" rx="4" fill="#f3e5f5"/>
  <text x="715" y="252" font-size="9" text-anchor="middle" font-family="Arial" fill="#333">Code Reviewer</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
</svg>
