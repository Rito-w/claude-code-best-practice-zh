<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="300" y="40" font-size="18" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#333">SDK vs CLI System Prompts</text>

  <!-- SDK Box -->
  <rect x="50" y="80" width="220" height="120" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="160" y="110" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#1976d2">Agent SDK</text>
  <text x="160" y="140" font-size="11" text-anchor="middle" font-family="Arial" fill="#555">System Prompts</text>
  <text x="160" y="160" font-size="11" text-anchor="middle" font-family="Arial" fill="#555">Tool Definitions</text>
  <text x="160" y="180" font-size="11" text-anchor="middle" font-family="Arial" fill="#555">Model API</text>

  <!-- CLI Box -->
  <rect x="330" y="80" width="220" height="120" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="440" y="110" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#e65100">Claude Code CLI</text>
  <text x="440" y="140" font-size="11" text-anchor="middle" font-family="Arial" fill="#555">System Instructions</text>
  <text x="440" y="160" font-size="11" text-anchor="middle" font-family="Arial" fill="#555">Hooks &amp; Rules</text>
  <text x="440" y="180" font-size="11" text-anchor="middle" font-family="Arial" fill="#555">Local Context</text>

  <!-- Arrow -->
  <line x1="270" y1="140" x2="330" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Common Box -->
  <rect x="180" y="240" width="240" height="100" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="300" y="270" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#2e7d32">Common Capabilities</text>
  <text x="300" y="295" font-size="11" text-anchor="middle" font-family="Arial" fill="#555">Tool Use · Context Management · Multi-turn</text>
  <text x="300" y="315" font-size="11" text-anchor="middle" font-family="Arial" fill="#555">Code Analysis · File Operations</text>
  <text x="300" y="335" font-size="11" text-anchor="middle" font-family="Arial" fill="#555">Agent Communication</text>
</svg>
