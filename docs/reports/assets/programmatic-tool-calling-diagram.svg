<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="350" y="35" font-size="18" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#333">Programmatic Tool Calling Architecture</text>

  <!-- Traditional Box -->
  <rect x="30" y="70" width="300" height="180" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="180" y="100" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#c62828">Traditional Tool Calling</text>

  <rect x="50" y="115" width="260" height="30" rx="4" fill="#fff" stroke="#c62828"/>
  <text x="180" y="135" font-size="11" text-anchor="middle" font-family="Arial" fill="#333">Each tool defined separately</text>

  <rect x="50" y="150" width="260" height="30" rx="4" fill="#fff" stroke="#c62828"/>
  <text x="180" y="170" font-size="11" text-anchor="middle" font-family="Arial" fill="#333">Manual registration required</text>

  <rect x="50" y="185" width="260" height="30" rx="4" fill="#fff" stroke="#c62828"/>
  <text x="180" y="205" font-size="11" text-anchor="middle" font-family="Arial" fill="#333">Repetitive boilerplate code</text>

  <rect x="50" y="220" width="260" height="30" rx="4" fill="#fff" stroke="#c62828"/>
  <text x="180" y="240" font-size="11" text-anchor="middle" font-family="Arial" fill="#333">Hard to maintain at scale</text>

  <!-- Programmatic Box -->
  <rect x="370" y="70" width="300" height="180" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="520" y="100" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#2e7d32">Programmatic Tool Calling</text>

  <rect x="390" y="115" width="260" height="30" rx="4" fill="#fff" stroke="#2e7d32"/>
  <text x="520" y="135" font-size="11" text-anchor="middle" font-family="Arial" fill="#333">Dynamic tool generation</text>

  <rect x="390" y="150" width="260" height="30" rx="4" fill="#fff" stroke="#2e7d32"/>
  <text x="520" y="170" font-size="11" text-anchor="middle" font-family="Arial" fill="#333">Template-based definitions</text>

  <rect x="390" y="185" width="260" height="30" rx="4" fill="#fff" stroke="#2e7d32"/>
  <text x="520" y="205" font-size="11" text-anchor="middle" font-family="Arial" fill="#333">Automatic registration</text>

  <rect x="390" y="220" width="260" height="30" rx="4" fill="#fff" stroke="#2e7d32"/>
  <text x="520" y="240" font-size="11" text-anchor="middle" font-family="Arial" fill="#333">Clean &amp; maintainable</text>

  <!-- Benefits Box -->
  <rect x="150" y="290" width="400" height="160" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="350" y="320" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#1565c0">Key Benefits</text>

  <text x="180" y="350" font-size="11" font-family="Arial" fill="#333">✓ 80% less boilerplate code</text>
  <text x="180" y="375" font-size="11" font-family="Arial" fill="#333">✓ Centralized tool management</text>
  <text x="180" y="400" font-size="11" font-family="Arial" fill="#333">✓ Easier to add new tools</text>
  <text x="180" y="425" font-size="11" font-family="Arial" fill="#333">✓ Consistent error handling</text>
  <text x="420" y="350" font-size="11" font-family="Arial" fill="#333">✓ Type-safe by design</text>
  <text x="420" y="375" font-size="11" font-family="Arial" fill="#333">✓ Better IDE support</text>
  <text x="420" y="400" font-size="11" font-family="Arial" fill="#333">✓ Simplified testing</text>
  <text x="420" y="425" font-size="11" font-family="Arial" fill="#333">✓ Improved documentation</text>
</svg>
