<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 最佳实践 - 中文翻译版</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
    <style>
        .markdown-section code {
            color: #e96900;
            background-color: #f8f8f8;
            padding: 0.2em 0.4em;
            border-radius: 3px;
        }
        .markdown-section pre {
            background-color: #f8f8f8;
            padding: 1em;
            overflow-x: auto;
        }
        .app-nav li {
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        window.$docsify = {
            name: 'Claude Code 最佳实践',
            repo: 'https://github.com/Rito-w/claude-code-best-practice-zh',
            loadSidebar: true,
            loadNavbar: true,
            subMaxLevel: 3,
            auto2top: true,
            search: {
                maxAge: 86400000,
                paths: [
                    '/best-practice/claude-commands.md',
                    '/best-practice/claude-skills.md',
                    '/best-practice/claude-subagents.md',
                ],
                placeholder: '搜索...',
                noData: '找不到结果',
                depth: 3
            },
            pagination: {
                previousText: '上一篇',
                nextText: '下一篇',
                crossChapter: true,
                crossChapterText: true,
            },
            plugins: [
                function(hook, vm) {
                    hook.beforeEach(function (html) {
                        var url = 'https://github.com/Rito-w/claude-code-best-practice-zh/blob/main/' + vm.route.file;
                        var editHtml = '[:memo: 在 GitHub 上编辑](" + url + ")\n';
                        return editHtml + html;
                    });
                    
                    hook.doneEach(function() {
                        var enUrl = window.location.href.replace('.md', '.en.md');
                        var cnUrl = window.location.href.replace('.en.md', '.md');
                        var isEn = window.location.href.includes('.en.md');
                        var toggleUrl = isEn ? cnUrl : enUrl;
                        var toggleText = isEn ? '🇨🇳 中文' : '🇺🇸 English';
                        
                        var langToggle = '<div style="position: fixed; top: 60px; right: 20px; z-index: 1000;"><a href="' + toggleUrl + '" style="background: #42b983; color: white; padding: 8px 15px; border-radius: 4px; text-decoration: none; font-weight: bold;">' + toggleText + '</a></div>';
                        document.body.insertAdjacentHTML('beforeend', langToggle);
                    });
                }
            ]
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@latest/dist/docsify-pagination.min.js"></script>
</body>
</html>
