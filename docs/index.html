<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 最佳实践</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
    <style>
        .sidebar { background-color: #f8f9fa; }
        .sidebar-nav { margin-top: 0; }
        .sidebar-nav ul { padding-left: 15px; }
        .sidebar-nav li { margin: 8px 0; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        window.$docsify = {
            name: '📖 Claude Code',
            repo: 'https://github.com/Rito-w/claude-code-best-practice-zh',
            loadSidebar: true,
            loadNavbar: false,
            subMaxLevel: 2,
            auto2top: true,
            search: 'auto',
            themeColor: '#42b983'
        }
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
