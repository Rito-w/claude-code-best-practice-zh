<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 最佳实践</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
    <style>
        .sidebar { background-color: #f8f9fa; border-right: 1px solid #ddd; }
        .sidebar-nav ul { padding-left: 20px !important; }
        .sidebar-nav li { margin: 10px 0 !important; }
        .markdown-section h1 { color: #42b983; }
        .markdown-section h2 { color: #34495e; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
        .markdown-section code { color: #e96900; background-color: #f8f8f8; padding: 0.2em 0.4em; border-radius: 3px; }
        .markdown-section pre { background-color: #f8f8f8; padding: 1em; overflow-x: auto; }
        .markdown-section table { border-collapse: collapse; width: 100%; }
        .markdown-section th, .markdown-section td { border: 1px solid #ddd; padding: 8px; }
        .markdown-section th { background-color: #f2f2f2; font-weight: bold; }
        .markdown-section img { max-width: 100%; }
    </style>
</head>
<body>
    <div id="app">加载中...</div>
    <script>
        window.$docsify = {
            name: '📖 Claude Code',
            repo: 'https://github.com/Rito-w/claude-code-best-practice-zh',
            loadSidebar: '_sidebar.md',
            maxLevel: 3,
            subMaxLevel: 2,
            auto2top: true,
            search: {
                placeholder: '搜索...'
            },
            formatUpdated: '{YYYY}/{MM}/{DD} {HH}:{mm}',
            relativePath: true,
            loadNavbar: false
        }
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
</body>
</html>
