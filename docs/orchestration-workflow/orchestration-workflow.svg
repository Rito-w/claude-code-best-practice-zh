<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="450" y="35" font-size="18" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#333">Orchestration Workflow Architecture</text>

  <!-- Command Layer -->
  <rect x="30" y="60" width="260" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="160" y="90" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#1976d2">Command Layer</text>
  <text x="160" y="115" font-size="11" text-anchor="middle" font-family="Arial" fill="#555">/weather-orchestrator</text>
  <text x="160" y="135" font-size="10" text-anchor="middle" font-family="Arial" fill="#888">Entry point, user interaction</text>

  <!-- Arrow to Agent -->
  <line x1="290" y1="100" x2="340" y2="100" stroke="#666" stroke-width="2"/>
  <polygon points="340,95 350,100 340,105" fill="#666"/>

  <!-- Agent Layer -->
  <rect x="350" y="60" width="260" height="80" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="480" y="90" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#e65100">Agent Layer</text>
  <text x="480" y="115" font-size="11" text-anchor="middle" font-family="Arial" fill="#555">weather-agent</text>
  <text x="480" y="135" font-size="10" text-anchor="middle" font-family="Arial" fill="#888">Fetch data via skills</text>

  <!-- Arrow to Skill -->
  <line x1="610" y1="100" x2="660" y2="100" stroke="#666" stroke-width="2"/>
  <polygon points="660,95 670,100 660,105" fill="#666"/>

  <!-- Skill Layer -->
  <rect x="670" y="60" width="200" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="770" y="90" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#2e7d32">Skill Layer</text>
  <text x="770" y="115" font-size="11" text-anchor="middle" font-family="Arial" fill="#555">weather-svg-creator</text>
  <text x="770" y="135" font-size="10" text-anchor="middle" font-family="Arial" fill="#888">Render SVG output</text>

  <!-- Data Flow Down -->
  <line x1="480" y1="140" x2="480" y2="200" stroke="#666" stroke-width="2"/>
  <polygon points="475,200 480,210 485,200" fill="#666"/>

  <!-- Output Section -->
  <rect x="280" y="210" width="400" height="120" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
  <text x="480" y="240" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#9c27b0">Output Files</text>

  <rect x="300" y="255" width="160" height="60" rx="4" fill="#fff" stroke="#9c27b0"/>
  <text x="380" y="280" font-size="10" text-anchor="middle" font-family="Arial" fill="#333">weather.svg</text>
  <text x="380" y="300" font-size="9" text-anchor="middle" font-family="Arial" fill="#888">Visual output</text>

  <rect x="500" y="255" width="160" height="60" rx="4" fill="#fff" stroke="#9c27b0"/>
  <text x="580" y="280" font-size="10" text-anchor="middle" font-family="Arial" fill="#333">output.md</text>
  <text x="580" y="300" font-size="9" text-anchor="middle" font-family="Arial" fill="#888">Documentation</text>

  <!-- Feedback Loop -->
  <line x1="770" y1="140" x2="770" y2="380" stroke="#666" stroke-width="2"/>
  <line x1="770" y1="380" x2="160" y2="380" stroke="#666" stroke-width="2"/>
  <line x1="160" y1="380" x2="160" y2="140" stroke="#666" stroke-width="2"/>
  <polygon points="155,140 160,130 165,140" fill="#666"/>
  <text x="480" y="400" font-size="10" text-anchor="middle" font-family="Arial" fill="#666">Continuous improvement loop</text>

  <!-- Memory -->
  <rect x="50" y="320" width="220" height="50" rx="8" fill="#ffe0b2" stroke="#f57c00" stroke-width="2"/>
  <text x="160" y="345" font-size="12" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#e65100">Project Memory</text>
  <text x="160" y="362" font-size="9" text-anchor="middle" font-family="Arial" fill="#888">Persistent context</text>
</svg>
